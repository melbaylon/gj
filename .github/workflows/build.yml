name: go macos build

on:
  push:
    branches: ["main"]

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Build for Intel MacOS (Monterey+)
        run: go build -ldflags="-s -w" -gcflags="-l=4" -o bin/yo main.go
        env:
          GOOS: darwin
          GOARCH: amd64
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: bin/yo
          make_latest: true
